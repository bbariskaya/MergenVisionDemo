services:
  postgres:
    image: postgres:16.4-alpine
    env_file: [.env]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mergenvision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-env}
      POSTGRES_DB: ${POSTGRES_DB:-mergenvision}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-mergenvision} -d $${POSTGRES_DB:-mergenvision}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    env_file: [.env]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mergenvision}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-in-env}
    volumes:
      - minio_data:/data
    ports: ["9000:9000", "9001:9001"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.14.0
    volumes:
      - qdrant_data:/qdrant/storage
    ports: ["6333:6333"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && timeout 1 cat <&3 | head -1 | grep -q 200'"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: [.env]
    volumes:
      - ./artifacts:/app/artifacts
      - ./artifacts/models:/models:ro
      - ./artifacts/engines:/engines:ro
      - api_tmp:/tmp
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
      qdrant: {condition: service_healthy}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    ports: ["8000:8000"]

  ui-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    volumes:
      - ui_dist:/app/dist

  ui:
    image: nginx:1.27-alpine
    volumes:
      - ui_dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api: {condition: service_healthy}
    ports: ["8080:80"]

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  api_tmp:
  ui_dist:
