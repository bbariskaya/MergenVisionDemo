services:
  postgres:
    image: postgres:16.4-alpine
    env_file: [.env]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mergenvision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-env}
      POSTGRES_DB: ${POSTGRES_DB:-mergenvision}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-mergenvision} -d $${POSTGRES_DB:-mergenvision}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    env_file: [.env]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mergenvision}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-in-env}
    volumes:
      - minio_data:/data
    ports: ["9000:9000", "9001:9001"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.14.0
    volumes:
      - qdrant_data:/qdrant/storage
    ports: ["6333:6333"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && timeout 1 cat <&3 | head -1 | grep -q 200'"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: [.env]
    volumes:
      - ./artifacts:/app/artifacts
      - ./artifacts/models:/models:ro
      - ./artifacts/engines:/engines:ro
      - ./lfw:/app/lfw:ro
      - api_tmp:/tmp
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
      qdrant: {condition: service_healthy}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    ports: ["8000:8000"]

  gpu-worker-0:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app.workers.gpu_worker:app", "--host", "0.0.0.0", "--port", "8001"]
    env_file: [.env]
    environment:
      WORKER_ID: gpu-worker-0
      HOST_GPU_DEVICE_ID: ${GPU_WORKER_0_DEVICE_ID:-0}
      API_PORT: 8001
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./artifacts:/app/artifacts
      - ./artifacts/models:/models:ro
      - ./artifacts/engines:/engines:ro
      - ./lfw:/app/lfw:ro
      - worker0_tmp:/tmp
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
      qdrant: {condition: service_healthy}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_WORKER_0_DEVICE_ID:-0}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s

  gpu-worker-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app.workers.gpu_worker:app", "--host", "0.0.0.0", "--port", "8001"]
    env_file: [.env]
    environment:
      WORKER_ID: gpu-worker-1
      HOST_GPU_DEVICE_ID: ${GPU_WORKER_1_DEVICE_ID:-1}
      API_PORT: 8001
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./artifacts:/app/artifacts
      - ./artifacts/models:/models:ro
      - ./artifacts/engines:/engines:ro
      - ./lfw:/app/lfw:ro
      - worker1_tmp:/tmp
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
      qdrant: {condition: service_healthy}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_WORKER_1_DEVICE_ID:-1}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s

  gpu-worker-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app.workers.gpu_worker:app", "--host", "0.0.0.0", "--port", "8001"]
    env_file: [.env]
    environment:
      WORKER_ID: gpu-worker-2
      HOST_GPU_DEVICE_ID: ${GPU_WORKER_2_DEVICE_ID:-2}
      API_PORT: 8001
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./artifacts:/app/artifacts
      - ./artifacts/models:/models:ro
      - ./artifacts/engines:/engines:ro
      - ./lfw:/app/lfw:ro
      - worker2_tmp:/tmp
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_healthy}
      qdrant: {condition: service_healthy}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_WORKER_2_DEVICE_ID:-2}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      api: {condition: service_healthy}
    ports: ["8080:80"]

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  api_tmp:
  worker0_tmp:
  worker1_tmp:
  worker2_tmp:
